# Render Blueprint - Best Lap (Hybrid Architecture)
# Deploys Backend + Frontend on Render, Database on AWS EC2
# Documentation: https://render.com/docs/blueprint-spec
#
# Architecture:
# - Render.com: API + Admin + Metrics Collector + Dashboard
# - AWS EC2: TimescaleDB + Redis (self-hosted with full TimescaleDB Community features)
# - Hybrid approach: Managed services on Render, Database on EC2 for TimescaleDB features
#
# Usage:
# 1. Deploy TimescaleDB on EC2 first: pnpm db:up
# 2. Configure EC2 security group to allow Render IPs (see RENDER-DEPLOYMENT.md)
# 3. Push this file to GitHub
# 4. Render Dashboard → New → Blueprint
# 5. Configure DB_HOST, DB_PORT, REDIS_HOST to point to EC2
# 6. Apply

services:
  # ============================================
  # API Backend (Node.js)
  # ============================================
  - type: web
    name: best-lap-api
    runtime: node
    region: ohio  # us-east-2
    plan: starter  # $7/mês (no cold starts, 512MB RAM)
    buildCommand: pnpm install --prod=false && pnpm build --filter=@best-lap/api...
    startCommand: cd apps/api && pnpm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: API_PORT
        value: 3333

      # Database (TimescaleDB on EC2)
      - key: DB_HOST
        sync: false  # Set to EC2 instance IP or hostname
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        value: best_lap
      - key: DB_PASSWORD
        sync: false  # Set to TimescaleDB password
      - key: DB_NAME
        value: best_lap_db

      # Redis (Redis Cloud - external free tier)
      - key: REDIS_HOST
        sync: false  # Set to Redis Cloud host (e.g., redis-12345.c1.us-east-2.redislabs.com)
      - key: REDIS_PORT
        sync: false  # Set to Redis Cloud port (usually not 6379, e.g., 12345)
      - key: REDIS_PASSWORD
        sync: false  # Set Redis Cloud password (required)

      # External APIs
      - key: GOOGLE_API_KEY
        sync: false  # MUST set manually in Render UI

      # Authentication
      - key: JWT_SECRET
        generateValue: true  # Auto-generated secure secret
      - key: JWT_EXPIRES_IN
        value: 24h

      # CORS
      - key: CORS_ORIGIN
        value: "*"  # Update to specific domain in production

      # Swagger
      - key: FORCE_HTTP_SWAGGER
        value: false

  # ============================================
  # Admin Panel (Bull Board)
  # ============================================
  - type: web
    name: best-lap-admin
    runtime: node
    region: ohio
    plan: free  # OK para admin - cold starts aceitáveis
    buildCommand: pnpm install --prod=false && pnpm build --filter=@best-lap/admin...
    startCommand: cd apps/admin && pnpm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: BULL_BOARD_PORT
        value: 4000

      - key: ADMIN_TOKEN
        generateValue: true  # Auto-generated secure token

      # Redis (Redis Cloud - external free tier)
      - key: REDIS_HOST
        sync: false  # Set to Redis Cloud host (e.g., redis-12345.c1.us-east-2.redislabs.com)
      - key: REDIS_PORT
        sync: false  # Set to Redis Cloud port (usually not 6379, e.g., 12345)
      - key: REDIS_PASSWORD
        sync: false  # Set Redis Cloud password (required)

  # ============================================
  # Metrics Collector (Background Worker)
  # ============================================
  - type: worker
    name: best-lap-metrics-collector
    runtime: node
    region: ohio
    plan: starter  # $7/mês - Workers precisam estar sempre on (cron jobs)
    buildCommand: pnpm install --prod=false && pnpm build --filter=@best-lap/metrics-collector...
    startCommand: cd apps/metrics-collector && pnpm start

    envVars:
      - key: NODE_ENV
        value: production

      # Database (TimescaleDB on EC2)
      - key: DB_HOST
        sync: false  # Set to EC2 instance IP or hostname
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        value: best_lap
      - key: DB_PASSWORD
        sync: false  # Set to TimescaleDB password
      - key: DB_NAME
        value: best_lap_db

      # Redis (Redis Cloud - external free tier)
      - key: REDIS_HOST
        sync: false  # Set to Redis Cloud host (e.g., redis-12345.c1.us-east-2.redislabs.com)
      - key: REDIS_PORT
        sync: false  # Set to Redis Cloud port (usually not 6379, e.g., 12345)
      - key: REDIS_PASSWORD
        sync: false  # Set Redis Cloud password (required)

      # External APIs
      - key: GOOGLE_API_KEY
        sync: false  # MUST set manually in Render UI

      # Cron schedule
      - key: COLLECT_METRICS_CRON_EXPRESSION
        value: "0 8,14,20 * * *"  # 8am, 2pm, 8pm daily

      # Worker settings
      - key: WORKER_CONCURRENCY
        value: 10

      # Optional seed URL
      - key: SEED_THEMES_URL
        sync: false  # Optional

  # ============================================
  # Dashboard Frontend (Static Site)
  # ============================================
  - type: web
    name: best-lap-dashboard
    runtime: static
    buildCommand: pnpm install --prod=false && pnpm build --filter=@best-lap/web
    staticPublishPath: ./apps/web/dist

    # Security headers
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate

    # SPA routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # API URL - Set manually after API deploys (e.g., https://best-lap-api.onrender.com)
      - key: VITE_API_URL
        sync: false

# ============================================
# Infrastructure Notes
# ============================================
# Database: TimescaleDB on AWS EC2
# - Full TimescaleDB Community features (continuous aggregates, compression, retention)
# - Better performance for time-series data (3-5x faster than standard PostgreSQL)
# - Cost: ~$17/mês (t3.small)
#
# Redis: Redis Cloud (external free tier)
# - 30MB storage, 30 connections
# - Cost: FREE
# - Setup: https://redis.com/try-free/
#
# Total Infrastructure Cost: ~$17/mês (EC2 only)
# Total Render Cost: $14/mês (API $7 + Metrics Collector $7 + Admin FREE + Dashboard FREE)
# TOTAL: ~$31/mês
#
# Security Setup Required:
# 1. Configure EC2 Security Group to allow port 5432 from Render outbound IPs
# 2. Use EC2 Elastic IP or hostname for DB_HOST
# 3. Setup Redis Cloud and get connection details
# 4. Use strong passwords for DB_PASSWORD and REDIS_PASSWORD
