# Render Blueprint - Best Lap (Full Stack on Render)
# Deploys ALL services on Render: API, Admin, Metrics Collector, Dashboard, PostgreSQL, Redis
# Documentation: https://render.com/docs/blueprint-spec
#
# Architecture:
# - Render.com: API + Admin + Metrics Collector + Dashboard + PostgreSQL + Redis
# - All services managed, auto-deploy, HTTPS, high availability
#
# Usage:
# 1. Push this file to GitHub
# 2. Render Dashboard → New → Blueprint
# 3. Select repository and this file
# 4. Configure required environment variables (marked with sync: false)
# 5. Apply

services:
  # ============================================
  # API Backend (Node.js)
  # ============================================
  - type: web
    name: best-lap-api
    runtime: node
    region: ohio  # us-east-2
    plan: starter  # $7/mês (no cold starts, 512MB RAM)
    buildCommand: pnpm install && pnpm build --filter=@best-lap/api...
    startCommand: cd apps/api && pnpm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: API_PORT
        value: 3333

      # Database (managed by Render)
      - key: DB_HOST
        fromDatabase:
          name: best-lap-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: best-lap-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: best-lap-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: best-lap-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: best-lap-db
          property: database

      # Redis (Redis Cloud - external)
      - key: REDIS_HOST
        sync: false  # Set to Redis Cloud host
      - key: REDIS_PORT
        sync: false  # Set to Redis Cloud port (usually not 6379)
      - key: REDIS_PASSWORD
        sync: false  # Set Redis Cloud password if required

      # External APIs
      - key: GOOGLE_API_KEY
        sync: false  # MUST set manually in Render UI

      # Authentication
      - key: JWT_SECRET
        generateValue: true  # Auto-generated secure secret
      - key: JWT_EXPIRES_IN
        value: 24h

      # CORS
      - key: CORS_ORIGIN
        value: "*"  # Update to specific domain in production

      # Swagger
      - key: FORCE_HTTP_SWAGGER
        value: false

  # ============================================
  # Admin Panel (Bull Board)
  # ============================================
  - type: web
    name: best-lap-admin
    runtime: node
    region: ohio
    plan: free  # OK para admin - cold starts aceitáveis
    buildCommand: pnpm install && pnpm build --filter=@best-lap/admin...
    startCommand: cd apps/admin && pnpm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: BULL_BOARD_PORT
        value: 4000

      - key: ADMIN_TOKEN
        generateValue: true  # Auto-generated secure token

      # Redis (Redis Cloud - external)
      - key: REDIS_HOST
        sync: false  # Set to Redis Cloud host
      - key: REDIS_PORT
        sync: false  # Set to Redis Cloud port (usually not 6379)
      - key: REDIS_PASSWORD
        sync: false  # Set Redis Cloud password if required

  # ============================================
  # Metrics Collector (Background Worker)
  # ============================================
  - type: worker
    name: best-lap-metrics-collector
    runtime: node
    region: ohio
    plan: starter  # $7/mês - Workers precisam estar sempre on (cron jobs)
    buildCommand: pnpm install && pnpm build --filter=@best-lap/metrics-collector...
    startCommand: cd apps/metrics-collector && pnpm start

    envVars:
      - key: NODE_ENV
        value: production

      # Database (managed by Render)
      - key: DB_HOST
        fromDatabase:
          name: best-lap-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: best-lap-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: best-lap-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: best-lap-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: best-lap-db
          property: database

      # Redis (Redis Cloud - external)
      - key: REDIS_HOST
        sync: false  # Set to Redis Cloud host
      - key: REDIS_PORT
        sync: false  # Set to Redis Cloud port (usually not 6379)
      - key: REDIS_PASSWORD
        sync: false  # Set Redis Cloud password if required

      # External APIs
      - key: GOOGLE_API_KEY
        sync: false  # MUST set manually in Render UI

      # Cron schedule
      - key: COLLECT_METRICS_CRON_EXPRESSION
        value: "0 8,14,20 * * *"  # 8am, 2pm, 8pm daily

      # Worker settings
      - key: WORKER_CONCURRENCY
        value: 10

      # Optional seed URL
      - key: SEED_THEMES_URL
        sync: false  # Optional

  # ============================================
  # Dashboard Frontend (Static Site)
  # ============================================
  - type: web
    name: best-lap-dashboard
    runtime: static
    buildCommand: pnpm install && pnpm build --filter=@best-lap/web
    staticPublishPath: ./apps/web/dist

    # Security headers
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate

    # SPA routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # API URL - Set manually after API deploys (e.g., https://best-lap-api.onrender.com)
      - key: VITE_API_URL
        sync: false

# ============================================
# Databases
# ============================================
databases:
  # PostgreSQL with TimescaleDB extension
  - name: best-lap-db
    databaseName: best_lap_db
    user: best_lap
    plan: basic-256mb  # $6/mês + storage ($0.30/GB) - 256MB RAM, 0.1 CPU
    region: ohio
    postgresMajorVersion: 14
    ipAllowList: []  # Allow from all Render services

# ============================================
# Redis
# ============================================
# Using Redis Cloud (external) instead of Render Redis
# Configure REDIS_HOST in each service's environment variables
